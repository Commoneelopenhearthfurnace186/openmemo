project_id = "openmemo"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083
import_map = "./functions/import_map.json"

[analytics]
enabled = false
port = 54327
vector_port = 54328
backend = "postgres"

# Telegram webhook authenticates via the X-Telegram-Bot-Api-Secret-Token
# header, so JWT verification is disabled.
[functions.telegram-webhook]
verify_jwt = false

# Calendar is gated by a per-deployment token in the URL.
[functions.calendar]
verify_jwt = false

# Dispatcher is called by pg_cron with the service-role JWT.
[functions.dispatch-reminder]
verify_jwt = true

# Pulse is also called by pg_cron with the service-role JWT.
[functions.pulse]
verify_jwt = true
