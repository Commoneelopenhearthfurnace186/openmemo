<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Support OpenMemo on Ko-fi">
  <defs>
    <linearGradient id="kbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5e5b"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <radialGradient id="kglow" cx="0.2" cy="0.8" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="kshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#kbg)"/>
  <rect width="1200" height="400" fill="url(#kglow)"/>

  <g transform="translate(72,90)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="72" fill="#ffffff" letter-spacing="-2">
      Build with OpenMemo,
    </text>
    <text y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="72" fill="#ffeb3b" letter-spacing="-2">
      keep it open.
    </text>
    <text y="138" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="22" fill="#fff5f5" letter-spacing="-0.3">
      Free, self-hosted Telegram assistant.
    </text>
    <text y="166" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="22" fill="#fff5f5" letter-spacing="-0.3">
      Your tip pays a coffee, ships the next feature.
    </text>

    <g transform="translate(0,210)" filter="url(#kshadow)">
      <rect width="208" height="56" rx="28" fill="#ffffff"/>
      <text x="104" y="36" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="20" fill="#ff5e5b">
        ☕ Tip on Ko-fi
      </text>
    </g>
  </g>

  <g transform="translate(820,80)">
    <g filter="url(#kshadow)">
      <rect width="320" height="240" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.4)"/>
    </g>
    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" fill="#ffffff">
      <text x="24" y="50" font-weight="800" font-size="22">Reminders. Calendar.</text>
      <text x="24" y="80" font-weight="800" font-size="22">Memory. Weather.</text>
      <text x="24" y="110" font-weight="800" font-size="22">News. Search. Files.</text>

      <g transform="translate(24,140)" font-size="14" font-weight="600">
        <g><circle cx="6" cy="6" r="4" fill="#22d3ee"/><text x="18" y="11">Self-hosted on Supabase</text></g>
        <g transform="translate(0,26)"><circle cx="6" cy="6" r="4" fill="#fbbf24"/><text x="18" y="11">Bring your own LLM key</text></g>
        <g transform="translate(0,52)"><circle cx="6" cy="6" r="4" fill="#34d399"/><text x="18" y="11">MIT licensed, no lock-in</text></g>
        <g transform="translate(0,78)"><circle cx="6" cy="6" r="4" fill="#f472b6"/><text x="18" y="11">3-step install</text></g>
      </g>
    </g>
  </g>
</svg>
