<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540" role="img" aria-label="BotFather screenshot guide">
  <defs>
    <linearGradient id="tg-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c2733"/>
      <stop offset="1" stop-color="#0d1620"/>
    </linearGradient>
    <linearGradient id="tg-msg-in" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2c39"/>
      <stop offset="1" stop-color="#192531"/>
    </linearGradient>
    <linearGradient id="tg-msg-out" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b6cb0"/>
      <stop offset="1" stop-color="#1f5293"/>
    </linearGradient>
    <filter id="card-shadow"><feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dy="3"/><feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="880" height="540" fill="#0a0d12"/>

  <g transform="translate(40,30)">
    <text font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="22" font-weight="800" fill="#fff">Step 1 — Get your bot token from @BotFather</text>
    <text y="28" font-family="-apple-system,Segoe UI,system-ui,sans-serif" font-size="14" fill="#9aa5b1">Open Telegram → search for @BotFather → press Start. Then:</text>
  </g>

  <g transform="translate(40,90)" filter="url(#card-shadow)">
    <rect width="800" height="430" rx="14" fill="url(#tg-bg)" stroke="#243140"/>

    <g transform="translate(0,0)">
      <rect width="800" height="48" rx="14" fill="#1f2c39"/>
      <circle cx="32" cy="24" r="14" fill="#2aabee"/>
      <text x="32" y="29" text-anchor="middle" font-family="-apple-system,Segoe UI,sans-serif" font-size="16" font-weight="800" fill="#fff">B</text>
      <text x="56" y="22" font-family="-apple-system,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#fff">BotFather</text>
      <text x="56" y="38" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#9aa5b1">official bot for creating bots</text>
    </g>

    <g transform="translate(20,72)">
      <rect width="240" height="34" rx="10" fill="url(#tg-msg-out)"/>
      <text x="14" y="22" font-family="-apple-system,Segoe UI,sans-serif" font-size="13.5" fill="#fff">/newbot</text>
    </g>

    <g transform="translate(20,116)">
      <rect width="500" height="46" rx="10" fill="url(#tg-msg-in)"/>
      <text x="14" y="20" font-family="-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#cbd5e0">Alright, a new bot. How are we going to call it?</text>
      <text x="14" y="36" font-family="-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#cbd5e0">Please choose a name for your bot.</text>
    </g>

    <g transform="translate(20,172)">
      <rect width="240" height="34" rx="10" fill="url(#tg-msg-out)"/>
      <text x="14" y="22" font-family="-apple-system,Segoe UI,sans-serif" font-size="13.5" fill="#fff">My Brain</text>
    </g>

    <g transform="translate(20,216)">
      <rect width="500" height="46" rx="10" fill="url(#tg-msg-in)"/>
      <text x="14" y="20" font-family="-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#cbd5e0">Good. Now let's choose a username for your bot.</text>
      <text x="14" y="36" font-family="-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#cbd5e0">It must end in 'bot'. Like: TetrisBot.</text>
    </g>

    <g transform="translate(20,272)">
      <rect width="240" height="34" rx="10" fill="url(#tg-msg-out)"/>
      <text x="14" y="22" font-family="-apple-system,Segoe UI,sans-serif" font-size="13.5" fill="#fff">my_brain_bot</text>
    </g>

    <g transform="translate(20,316)">
      <rect width="700" height="100" rx="10" fill="url(#tg-msg-in)" stroke="#22d3ee" stroke-width="2"/>
      <text x="14" y="22" font-family="-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#cbd5e0">Done! Your bot:</text>
      <text x="14" y="42" font-family="-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#cbd5e0">t.me/my_brain_bot</text>
      <text x="14" y="64" font-family="-apple-system,Segoe UI,sans-serif" font-size="12" fill="#9aa5b1">Use this token to access the HTTP API:</text>
      <rect x="14" y="72" width="680" height="22" rx="6" fill="#0d1822"/>
      <text x="20" y="88" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="12" font-weight="700" fill="#fbbf24">8123456789:AAH-abcd1234EXAMPLE_xyz_TOKEN_paste_in_env</text>
      <text x="710" y="88" text-anchor="end" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#22d3ee">↑ this is TELEGRAM_BOT_TOKEN</text>
    </g>
  </g>
</svg>
