<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380" role="img" aria-label="userinfobot screenshot">
  <defs>
    <linearGradient id="tg-bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c2733"/>
      <stop offset="1" stop-color="#0d1620"/>
    </linearGradient>
    <linearGradient id="tg-out2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b6cb0"/>
      <stop offset="1" stop-color="#1f5293"/>
    </linearGradient>
    <filter id="ui-shadow"><feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dy="3"/><feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="880" height="380" fill="#0a0d12"/>

  <g transform="translate(40,30)">
    <text font-family="-apple-system,Segoe UI,sans-serif" font-size="22" font-weight="800" fill="#fff">Step 2 — Get your Telegram chat ID from @userinfobot</text>
    <text y="28" font-family="-apple-system,Segoe UI,sans-serif" font-size="14" fill="#9aa5b1">Open Telegram → search @userinfobot → press Start (or send any message).</text>
  </g>

  <g transform="translate(40,90)" filter="url(#ui-shadow)">
    <rect width="800" height="270" rx="14" fill="url(#tg-bg2)" stroke="#243140"/>

    <g transform="translate(0,0)">
      <rect width="800" height="48" rx="14" fill="#1f2c39"/>
      <circle cx="32" cy="24" r="14" fill="#fbbf24"/>
      <text x="32" y="29" text-anchor="middle" font-family="-apple-system,Segoe UI,sans-serif" font-size="16" font-weight="800" fill="#1a1a1a">U</text>
      <text x="56" y="22" font-family="-apple-system,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#fff">userinfobot</text>
      <text x="56" y="38" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#9aa5b1">replies with your account info</text>
    </g>

    <g transform="translate(20,72)">
      <rect width="120" height="34" rx="10" fill="url(#tg-out2)"/>
      <text x="14" y="22" font-family="-apple-system,Segoe UI,sans-serif" font-size="13.5" fill="#fff">/start</text>
    </g>

    <g transform="translate(20,116)">
      <rect width="320" height="138" rx="10" fill="#1f2c39" stroke="#22d3ee" stroke-width="2"/>
      <text x="14" y="24" font-family="-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#cbd5e0">👤 <tspan font-weight="700">Your name</tspan></text>
      <text x="14" y="46" font-family="-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#cbd5e0">Id: <tspan font-family="ui-monospace,Menlo,Consolas,monospace" font-weight="700" fill="#fbbf24">123456789</tspan></text>
      <text x="14" y="68" font-family="-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#cbd5e0">First: Your name</text>
      <text x="14" y="90" font-family="-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#cbd5e0">Username: @yourhandle</text>
      <text x="14" y="112" font-family="-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#cbd5e0">Language: en</text>
    </g>

    <g transform="translate(360,124)">
      <text font-family="-apple-system,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#22d3ee">↑ that number is OWNER_CHAT_ID</text>
      <text y="22" font-family="-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#cbd5e0">Copy it (a 9-10 digit integer) and paste it</text>
      <text y="38" font-family="-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#cbd5e0">into <tspan font-family="ui-monospace,Menlo,Consolas,monospace" fill="#fbbf24">.env</tspan> as <tspan font-family="ui-monospace,Menlo,Consolas,monospace" fill="#fbbf24">OWNER_CHAT_ID=123456789</tspan>.</text>
    </g>
  </g>
</svg>
