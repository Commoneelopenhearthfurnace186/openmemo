<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="OpenMemo — your second brain in Telegram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#171a3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="0.5" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>

  <g opacity="0.07" stroke="#5b8cff" stroke-width="1">
    <path d="M0 80 H1280" /><path d="M0 160 H1280" /><path d="M0 240 H1280" />
    <path d="M160 0 V320" /><path d="M320 0 V320" /><path d="M480 0 V320" /><path d="M640 0 V320" /><path d="M800 0 V320" /><path d="M960 0 V320" /><path d="M1120 0 V320" />
  </g>

  <g transform="translate(64,80)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="76" fill="#ffffff" letter-spacing="-2">
      Open<tspan fill="url(#accent)">Memo</tspan>
    </text>
    <text y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="26" fill="#c8cfe6" letter-spacing="-0.5">
      Your second brain in Telegram. Self-hosted. Free tier.
    </text>

    <g transform="translate(0,80)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#0b1020">
      <g transform="translate(0,0)">
        <rect width="148" height="34" rx="17" fill="#22d3ee"/>
        <text x="74" y="22" text-anchor="middle" font-weight="700">📅 Reminders</text>
      </g>
      <g transform="translate(160,0)">
        <rect width="120" height="34" rx="17" fill="#a78bfa"/>
        <text x="60" y="22" text-anchor="middle" font-weight="700">🧠 Memory</text>
      </g>
      <g transform="translate(292,0)">
        <rect width="116" height="34" rx="17" fill="#f472b6"/>
        <text x="58" y="22" text-anchor="middle" font-weight="700">🎂 Friends</text>
      </g>
      <g transform="translate(420,0)">
        <rect width="156" height="34" rx="17" fill="#fbbf24"/>
        <text x="78" y="22" text-anchor="middle" font-weight="700">🛒 Shopping</text>
      </g>
      <g transform="translate(588,0)">
        <rect width="138" height="34" rx="17" fill="#34d399"/>
        <text x="69" y="22" text-anchor="middle" font-weight="700">🌤 Weather</text>
      </g>
      <g transform="translate(738,0)">
        <rect width="170" height="34" rx="17" fill="#60a5fa"/>
        <text x="85" y="22" text-anchor="middle" font-weight="700">📰 Good news</text>
      </g>
    </g>
  </g>

  <g transform="translate(880,72)" filter="url(#shadow)">
    <rect width="320" height="200" rx="20" fill="#1f2347" stroke="#2b315a"/>
    <rect width="320" height="40" rx="20" fill="#252a52"/>
    <circle cx="20" cy="20" r="6" fill="#3b82f6"/>
    <text x="36" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="13" fill="#e0e7ff" font-weight="600">Telegram → OpenMemo</text>

    <g transform="translate(16,56)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="12.5" fill="#e2e8f0">
      <g>
        <rect width="200" height="28" rx="14" fill="#3b3f6a"/>
        <text x="14" y="18" fill="#ffffff">remind me in 5 min — pizza</text>
      </g>
      <g transform="translate(0,40)">
        <rect width="240" height="28" rx="14" fill="url(#accent)"/>
        <text x="14" y="18" fill="#0b1020" font-weight="600">📬 set, ping you at 18:42</text>
      </g>
      <g transform="translate(0,80)">
        <rect width="220" height="28" rx="14" fill="#3b3f6a"/>
        <text x="14" y="18" fill="#ffffff">good morning ☀️</text>
      </g>
      <g transform="translate(0,120)">
        <rect width="288" height="28" rx="14" fill="url(#accent)"/>
        <text x="14" y="18" fill="#0b1020" font-weight="600">7°C, take a jacket. 3 things today</text>
      </g>
    </g>
  </g>
</svg>
