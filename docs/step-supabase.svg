<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540" role="img" aria-label="Supabase API keys screenshot">
  <defs>
    <linearGradient id="sb-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1f24"/>
      <stop offset="1" stop-color="#15171b"/>
    </linearGradient>
    <filter id="sb-shadow"><feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dy="3"/><feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="880" height="540" fill="#0a0d12"/>

  <g transform="translate(40,30)">
    <text font-family="-apple-system,Segoe UI,sans-serif" font-size="22" font-weight="800" fill="#fff">Step 3 — Get the 3 Supabase keys</text>
    <text y="28" font-family="-apple-system,Segoe UI,sans-serif" font-size="14" fill="#9aa5b1">Create a project at supabase.com → open it → left sidebar → Project Settings → API.</text>
  </g>

  <g transform="translate(40,90)" filter="url(#sb-shadow)">
    <rect width="800" height="430" rx="14" fill="url(#sb-bg)" stroke="#2b2f36"/>

    <rect width="800" height="44" rx="14" fill="#1f2329"/>
    <circle cx="32" cy="22" r="11" fill="#3ecf8e"/>
    <path d="M28,17 L36,22 L28,27 Z" fill="#15171b"/>
    <text x="56" y="20" font-family="-apple-system,Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#fff">supabase.com / project / settings / api</text>
    <text x="56" y="36" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#9aa5b1">Project Settings → API</text>

    <g transform="translate(24,64)">
      <text font-family="-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#cbd5e0">Project URL</text>
      <rect y="20" width="752" height="44" rx="8" fill="#0e1115" stroke="#2b2f36"/>
      <text x="14" y="46" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13" fill="#fbbf24">https://abcd1234efgh5678.supabase.co</text>
      <text x="745" y="14" text-anchor="end" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#22d3ee">→ SUPABASE_URL</text>
    </g>

    <g transform="translate(24,140)">
      <text font-family="-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#cbd5e0">Project API Keys</text>

      <g transform="translate(0,16)">
        <rect width="752" height="60" rx="8" fill="#0e1115" stroke="#2b2f36"/>
        <text x="14" y="20" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" font-weight="700" fill="#3ecf8e">anon · public</text>
        <text x="14" y="42" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="12" fill="#fbbf24">eyJhbGciOiJIUzI1NiIs...AbCd1234ExampleAnonKey</text>
        <text x="14" y="56" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#9aa5b1">safe to ship in client-side HTML, RLS still protects your data</text>
        <text x="745" y="20" text-anchor="end" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#22d3ee">→ SUPABASE_ANON_KEY</text>
      </g>

      <g transform="translate(0,90)">
        <rect width="752" height="74" rx="8" fill="#1a0f0f" stroke="#dc2626" stroke-width="1.5"/>
        <text x="14" y="20" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" font-weight="700" fill="#f87171">service_role · secret</text>
        <text x="14" y="42" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="12" fill="#fbbf24">eyJhbGciOiJIUzI1NiIs...AbCd1234ExampleServiceKey</text>
        <text x="14" y="58" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#fca5a5">⚠ keep secret. never put in client code.</text>
        <text x="14" y="72" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#fca5a5">it bypasses Row Level Security.</text>
        <text x="745" y="20" text-anchor="end" font-family="-apple-system,Segoe UI,sans-serif" font-size="11" fill="#22d3ee">→ SUPABASE_SERVICE_ROLE_KEY</text>
      </g>
    </g>

    <g transform="translate(24,332)">
      <rect width="752" height="76" rx="10" fill="#0e1f15" stroke="#3ecf8e"/>
      <text x="14" y="22" font-family="-apple-system,Segoe UI,sans-serif" font-size="12" fill="#9fffbb">Your three Supabase variables in .env:</text>
      <text x="14" y="42" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="12" fill="#22d3ee">SUPABASE_URL=https://abcd1234efgh5678.supabase.co</text>
      <text x="14" y="58" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="12" fill="#22d3ee">SUPABASE_ANON_KEY=eyJhbGci...</text>
      <text x="14" y="74" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="12" fill="#22d3ee">SUPABASE_SERVICE_ROLE_KEY=eyJhbGci...</text>
    </g>
  </g>
</svg>
