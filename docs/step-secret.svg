<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360" role="img" aria-label="How to generate the Telegram webhook secret">
  <defs>
    <linearGradient id="sec-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1422"/>
      <stop offset="1" stop-color="#0a0d18"/>
    </linearGradient>
    <filter id="sec-shadow"><feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dy="3"/><feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="880" height="360" fill="#0a0d12"/>

  <g transform="translate(40,30)">
    <text font-family="-apple-system,Segoe UI,sans-serif" font-size="22" font-weight="800" fill="#fff">Step 5 — Make up a webhook secret</text>
    <text y="28" font-family="-apple-system,Segoe UI,sans-serif" font-size="14" fill="#9aa5b1">A long random string. Anything works as long as you don't share it.</text>
  </g>

  <g transform="translate(40,90)" filter="url(#sec-shadow)">
    <rect width="800" height="240" rx="14" fill="url(#sec-bg)" stroke="#1e293b"/>

    <g transform="translate(20,20)">
      <text font-family="-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#22d3ee">Option 1 — terminal (macOS / Linux / WSL / Git Bash)</text>
      <rect y="14" width="760" height="38" rx="8" fill="#0e1422" stroke="#1e293b"/>
      <text x="14" y="38" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13" fill="#fbbf24">openssl rand -hex 24</text>
      <text x="14" y="68" font-family="-apple-system,Segoe UI,sans-serif" font-size="12" fill="#cbd5e0">prints something like</text>
      <rect y="76" width="760" height="32" rx="6" fill="#0a0e1a" stroke="#1e293b"/>
      <text x="14" y="97" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="12" fill="#a78bfa">a3f9e7c1d4b62e885f9d12acb7e4f08c1d3e9b25a701de44</text>
    </g>

    <g transform="translate(20,140)">
      <text font-family="-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#22d3ee">Option 2 — online generator</text>
      <text y="20" font-family="-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#cbd5e0">Open <tspan fill="#fbbf24">https://www.random.org/passwords/</tspan> → length 30, "Alphanumeric only".</text>
    </g>

    <g transform="translate(20,196)">
      <text font-family="-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#22d3ee">Option 3 — type random characters</text>
      <text y="20" font-family="-apple-system,Segoe UI,sans-serif" font-size="12.5" fill="#cbd5e0">Just press random keys on your keyboard until you have ~30 characters. Letters and numbers only.</text>
    </g>
  </g>
</svg>
